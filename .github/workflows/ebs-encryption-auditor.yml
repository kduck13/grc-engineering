name: ebs-encryption-auditor

on:
  push:
    paths:
      - "ebs-encryption-auditor/**"
      - ".github/workflows/ebs-encryption-auditor.yml"
  pull_request:
    paths:
      - "ebs-encryption-auditor/**"
      - ".github/workflows/ebs-encryption-auditor.yml"

defaults:
  run:
    working-directory: ebs-encryption-auditor

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Terraform lint
  #
  # tfsec and checkov WILL flag the intentional misconfigs in this lab:
  # - Unencrypted EBS volumes (that's the point — scanner finds them)
  # - No VPC isolation (using default VPC by design)
  # continue-on-error: true lets the pipeline proceed so pytest and pip-audit run.
  # The findings are visible in job logs and demonstrate what real IaC scanning looks like.
  # ---------------------------------------------------------------------------
  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ebs-encryption-auditor/terraform
        continue-on-error: true

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ebs-encryption-auditor/terraform
          framework: terraform
          quiet: true
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Job 2: Python tests
  #
  # Runs the full pytest suite using moto. No AWS credentials needed.
  # ---------------------------------------------------------------------------
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Job 3: Dependency security scan
  # ---------------------------------------------------------------------------
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan dependencies
        run: pip-audit -r scripts/requirements.txt
